services:
  db:
    image: postgres:17-alpine
    container_name: likesandswipes-db
    environment:
      POSTGRES_DB: likesandswipes
      POSTGRES_USER: likesandswipes
      POSTGRES_PASSWORD: likesandswipes1
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U likesandswipes -d likesandswipes"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: likesandswipes-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: likesandswipes
      MINIO_ROOT_PASSWORD: likesandswipes1
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  web:
    build:
      context: .
      dockerfile: LikesAndSwipes/Dockerfile
    container_name: likesandswipes-web
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=host.docker.internal;Port=5432;Database=likesandswipes;Username=likesandswipes;Password=likesandswipes1
      Minio__Endpoint: localhost:9000
      Minio__InternalEndpoint: minio:9000
      Minio__AccessKey: likesandswipes
      Minio__SecretKey: likesandswipes1
      Minio__BucketName: likesandswipes-files
      Minio__UseSsl: false
    ports:
      - "80:8080"

volumes:
  postgres-data:
  minio-data:
